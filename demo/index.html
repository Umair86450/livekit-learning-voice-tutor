<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Assistant Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 420px;
      max-width: 96vw;
      overflow: hidden;
    }

    .card-header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 24px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header .icon { font-size: 22px; }

    .card-body { padding: 20px 24px 24px; }

    /* Status badge */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      min-height: 28px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.connected   { background: #22c55e; }
    .dot.connecting  { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.error       { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 14px;
      color: #555;
    }

    /* Conversation box */
    .conversation {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      height: 280px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fafafa;
      margin-bottom: 18px;
      scroll-behavior: smooth;
    }

    .conversation:empty::before {
      content: "Conversation will appear here…";
      color: #bbb;
      font-size: 13px;
      margin: auto;
      text-align: center;
    }

    .msg {
      max-width: 80%;
      padding: 9px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg.agent {
      background: #e9ecef;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg .label {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.65;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn.start {
      background: #2563eb;
      color: #fff;
    }

    .btn.start:hover { background: #1d4ed8; }

    .btn.end {
      background: #ef4444;
      color: #fff;
    }

    .btn.end:hover { background: #dc2626; }

    .btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    audio { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="icon">🎙️</span>
    Voice Assistant
  </div>
  <div class="card-body">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="status">Not connected</span>
    </div>

    <div class="conversation" id="conversation"></div>

    <button class="btn start" id="mainBtn" onclick="toggleCall()">Start Call</button>
  </div>
</div>

<audio id="agentAudio" autoplay></audio>

<script>
  const { Room, RoomEvent, ParticipantKind, ConnectionState, Track } = LivekitClient;

  let room = null;
  let inCall = false;

  const dot        = document.getElementById("dot");
  const statusEl   = document.getElementById("status");
  const convBox    = document.getElementById("conversation");
  const btn        = document.getElementById("mainBtn");
  const agentAudio = document.getElementById("agentAudio");

  function setStatus(text, state) {
    statusEl.textContent = text;
    dot.className = "dot " + (state || "");
  }

  function addMessage(who, text) {
    if (!text || !text.trim()) return;
    const wrap = document.createElement("div");
    wrap.className = "msg " + who;
    const label = document.createElement("div");
    label.className = "label";
    label.textContent = who === "agent" ? "Assistant" : "You";
    const body = document.createElement("div");
    body.textContent = text.trim();
    wrap.appendChild(label);
    wrap.appendChild(body);
    convBox.appendChild(wrap);
    convBox.scrollTop = convBox.scrollHeight;
  }

  async function startCall() {
    btn.disabled = true;
    setStatus("Connecting…", "connecting");

    let token, url;
    try {
      const res  = await fetch("/token");
      const data = await res.json();
      token = data.token;
      url   = data.url;
    } catch (e) {
      setStatus("Token fetch failed", "error");
      btn.disabled = false;
      return;
    }

    room = new Room();

    room.on(RoomEvent.ConnectionStateChanged, (state) => {
      if (state === ConnectionState.Connected) {
        setStatus("Connected — listening…", "connected");
        btn.textContent = "End Call";
        btn.className   = "btn end";
        btn.disabled    = false;
        inCall          = true;
      } else if (state === ConnectionState.Connecting || state === ConnectionState.Reconnecting) {
        setStatus("Connecting…", "connecting");
        btn.disabled = true;
      } else if (state === ConnectionState.Disconnected) {
        resetUI();
      }
    });

    room.on(RoomEvent.TrackSubscribed, (track, _pub, participant) => {
      if (track.kind === "audio" && participant.kind === ParticipantKind.AGENT) {
        track.attach(agentAudio);
      }
    });

    room.on(RoomEvent.TranscriptionReceived, (segments, participant, publication) => {
      if (!participant) return;

      // Agent: isAgent flag ya AGENT kind
      const isAgent = participant.isAgent === true ||
                      (ParticipantKind && participant.kind === ParticipantKind.AGENT);

      // User: local participant ya identity match
      const isUser  = participant === room.localParticipant ||
                      participant.identity === "browser-user";

      if (!isAgent && !isUser) return;

      segments.forEach(seg => {
        if (seg.final && seg.text && seg.text.trim()) {
          addMessage(isAgent ? "agent" : "user", seg.text);
        }
      });
    });

    room.on(RoomEvent.Disconnected, () => { resetUI(); });

    try {
      await room.connect(url, token);
      // Enable local microphone
      await room.localParticipant.setMicrophoneEnabled(true);
    } catch (e) {
      setStatus("Connection failed: " + e.message, "error");
      btn.textContent = "Start Call";
      btn.className   = "btn start";
      btn.disabled    = false;
      inCall          = false;
      room = null;
    }
  }

  async function endCall() {
    if (room) {
      await room.disconnect();
      room = null;
    }
    resetUI();
  }

  function resetUI() {
    inCall          = false;
    btn.textContent = "Start Call";
    btn.className   = "btn start";
    btn.disabled    = false;
    setStatus("Not connected", "");
    if (agentAudio.srcObject) {
      agentAudio.srcObject = null;
    }
  }

  function toggleCall() {
    if (inCall) endCall();
    else        startCall();
  }
</script>
</body>
</html>
